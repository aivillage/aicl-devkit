openapi: 3.0.3
info:
  title: Moderator Service API
  description: API specification for the backend service used by the moderator host capability.
  version: 0.1.0
paths:
  /moderate:
    post:
      summary: Check message history for moderation
      description: Sends the full message history to the moderator backend to check if the next message should be blocked.
      operationId: checkMessages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckRequest'
      responses:
        '200':
          description: Moderation check outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckResponse'
        '400':
          description: Invalid request payload
        '500':
          description: Internal server error
components:
  schemas:
    ChatMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          description: The role of the message author (e.g., 'user', 'assistant', 'system').
          example: user
        content:
          type: string
          description: The text content of the message.
          example: I want to report a scam.
    CheckRequest:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          description: Chronological list of prior messages in the conversation.
          items:
            $ref: '#/components/schemas/ChatMessage'
    CheckResponse:
      type: object
      properties:
        block:
          type: boolean
          description: Whether the message should be blocked.
          example: false
        decision:
          type: string
          description: Detailed decision keyword ('block' or 'allow').
          example: allow
